# Render Blueprint — backend do Story R Us (api + worker + Postgres).
# Como usar: no Render -> New -> Blueprint -> conecte o repo. Ele cria tudo.
# Depois preencha as variaveis marcadas (chaves de IA e storage R2) no painel.
# Redis e OPCIONAL: sem ele, o worker faz polling do banco (tudo funciona).

databases:
  - name: storyrus-db
    plan: free
    databaseName: stories
    user: stories

services:
  # ---- API (FastAPI) ----
  - type: web
    name: storyrus-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    dockerCommand: sh start-api.sh
    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: storyrus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: KLING_ACCESS_KEY
        sync: false
      - key: KLING_SECRET_KEY
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ENDPOINT_URL
        sync: false
      - key: STORAGE_PUBLIC_ENDPOINT_URL
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false

  # ---- Worker (processa os jobs: personagem, historia, ebook, video) ----
  - type: worker
    name: storyrus-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    dockerCommand: python -m app.workers.runner
    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: storyrus-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: KLING_ACCESS_KEY
        sync: false
      - key: KLING_SECRET_KEY
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ENDPOINT_URL
        sync: false
      - key: STORAGE_PUBLIC_ENDPOINT_URL
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
